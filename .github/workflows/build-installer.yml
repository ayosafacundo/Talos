name: Build Talos Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-packages:
    name: Build Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"

      - name: Install protoc Go plugins
        shell: bash
        run: make install-tools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            Packages/Launchpad/package-lock.json
            Packages/Example TS App/package-lock.json
            sdk/ts/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build production app
        shell: bash
        run: make app-build

      - name: Compute package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-unstable.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Windows NSIS installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          wails build -tags=production -nsis
          New-Item -ItemType Directory -Path dist/packages -Force | Out-Null
          $installer = Get-ChildItem -Path build/bin -File | Where-Object { $_.Extension -eq ".exe" -and $_.Name -match "(?i)(installer|setup)" } | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not generated in build/bin."
          }
          Copy-Item $installer.FullName "dist/packages/talos-unstable-${{ steps.version.outputs.version }}-windows-installer.exe"

      - name: Build macOS DMG package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="build/bin/Talos.app"
          DMG_PATH="dist/packages/talos-unstable-${{ steps.version.outputs.version }}-macos.dmg"
          TMP_DIR="$(mktemp -d)"
          mkdir -p dist/packages
          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Expected app bundle missing at ${APP_PATH}"
            exit 1
          fi
          cp -R "${APP_PATH}" "${TMP_DIR}/"
          ln -s /Applications "${TMP_DIR}/Applications"
          hdiutil create -volname "Talos Unstable" -srcfolder "${TMP_DIR}" -ov -format UDZO "${DMG_PATH}"
          rm -rf "${TMP_DIR}"

      - name: Build Linux DEB package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_ROOT="dist/deb-root"
          BIN_SRC="build/bin/Talos"
          DEB_OUT="dist/packages/talos-unstable_${VERSION}_amd64.deb"
          mkdir -p "${PKG_ROOT}/DEBIAN" "${PKG_ROOT}/opt/talos-unstable" "${PKG_ROOT}/usr/share/applications" dist/packages
          if [[ ! -f "${BIN_SRC}" ]]; then
            echo "Expected binary missing at ${BIN_SRC}"
            exit 1
          fi
          install -m 0755 "${BIN_SRC}" "${PKG_ROOT}/opt/talos-unstable/Talos"
          cat > "${PKG_ROOT}/usr/share/applications/talos-unstable.desktop" <<'EOF'
          [Desktop Entry]
          Name=Talos (Unstable)
          Exec=/opt/talos-unstable/Talos
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF
          cat > "${PKG_ROOT}/DEBIAN/control" <<EOF
          Package: talos-unstable
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Talos Team
          Description: Talos unstable desktop app package
          EOF
          dpkg-deb --build "${PKG_ROOT}" "${DEB_OUT}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talos-package-${{ runner.os }}-${{ github.sha }}
          path: dist/packages/**
          if-no-files-found: error
