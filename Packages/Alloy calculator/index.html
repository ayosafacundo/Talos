<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchonMC | Industrial Production Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">ARCHON<span>MC</span></div>
            <nav>
                <button class="nav-btn active" onclick="showTab('inventory')">📦 Inventory</button>
                <button class="nav-btn" onclick="showTab('workbench')">🛠️ Workbench</button>
                <button class="nav-btn" onclick="showTab('registry')">📜 History</button>
            </nav>
            <div class="status-bar">
                <span id="connection-status">● System Online</span>
            </div>
        </aside>

        <main class="content">
            <section id="tab-inventory" class="tab-content">
                <header>
                    <h1>Material Inventory</h1>
                    <p>Manage your local-first storage state.</p>
                </header>
                <div class="inventory-grid" id="inventory-display">
                    </div>
            </section>
            <section id="tab-workbench" class="tab-content" style="display:none">
    <header>
        <h1>Production Workbench</h1>
    </header>
    <div class="workbench-ui">
        <div class="selection-panel">
            <label>Select a Recipe:</label>
            <select id="recipe-selector" onchange="autofillRecipe()"></select>
            
            <label>Target Unit:</label>
            <select id="target-unit-select"></select>
            
            <label>Amount:</label>
            <input type="number" id="target-amount" value="1" min="1">
            
            <button class="btn-primary" onclick="runSolver()">Calculate Production</button>
        </div>
        <div id="solution-output" class="solution-panel"></div>
    </div>
</section>

<section id="tab-history" class="tab-content" style="display:none">
    <header>
        <h1>Calculation History</h1>
        <button class="btn-small" onclick="clearHistory()">Clear Log</button>
    </header>
    <div id="history-log" class="history-list">
        </div>
</section>
        </main>
    </div>

    <script src="./engine/data_store.js"></script>
    <script src="./engine/production_engine.js"></script>
    <script src="./engine/app.js"></script>
</body>
</html>
