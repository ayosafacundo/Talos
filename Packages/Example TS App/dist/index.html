<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var q = new URLSearchParams(window.location.search);
          var t = (q.get("_talos_theme") || "").trim();
          var v = (q.get("_talos_theme_variant") || "").trim();
          if (t) document.documentElement.dataset.talosTheme = t;
          if (v) document.documentElement.dataset.talosThemeVariant = v;
        } catch (_) {}
      })();
    </script>
    <title>Example TypeScript app</title>
    <script type="module" src="./app.js"></script>
    <link rel="stylesheet" href="./app.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
